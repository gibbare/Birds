name = "aurora-push"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for storing push subscriptions
# After creating: wrangler kv:namespace create SUBS
# Replace the id below with the one you get from that command
[[kv_namespaces]]
binding = "SUBS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Run every 10 minutes
[triggers]
crons = ["*/10 * * * *"]

# Secrets (set via: wrangler secret put VAPID_PUBLIC_KEY etc.)
# VAPID_PUBLIC_KEY
# VAPID_PRIVATE_KEY
# VAPID_EMAIL
